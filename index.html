<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PLATFORMER +</title>
<style>
body { margin:0; background:#0f0f0f; color:white; text-align:center; font-family:sans-serif;}
canvas { display:block; margin:auto; background:#181818; border:1px solid #333;}
button { padding:10px 20px; margin:10px; cursor:pointer; transition: transform 0.2s;}
#title { color:red; font-size:32px; transition: transform 0.2s;}
.panel { display:none; }
</style>
</head>
<body>

<h1 id="title">PLATFORMER +</h1>

<div id="menu">
<p>
A/D = Move<br>
W or Space = Jump (Double Jump)<br>
J = Attack
</p>

<button id="startBtn" onclick="startGame()">Start Game</button>
<button id="settingsBtn" onclick="toggleSettings()">Settings</button>

<div id="settings" class="panel">
<p>⚙️ Settings (basic for now)</p>
</div>
</div>

<canvas id="game" width="800" height="400" style="display:none;"></canvas>

<div id="end" style="display:none;">
<h2 id="endText"></h2>
<button onclick="startGame()">Restart</button>
</div>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let keys = {};
document.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

let player, level, score, gameState, attackTimer, particles, boss, shake, flash;
let bossDying = false;

function init(){
player = {x:50,y:300,dx:0,dy:0,jumps:0,hp:100};
level = 0;
score = 0;
gameState = "play";
attackTimer = 0;
particles = [];
boss = {x:600,y:300,w:40,h:40,hp:60,dir:1};
shake = 0;
flash = 0;
bossDying = false;
}

// MAIN MENU ANIMATION
let menuAnim = 0;
let flashTimer = 0;
function animateMenu(){
menuAnim += 0.05;
document.getElementById("title").style.transform = `scale(${1+0.05*Math.sin(menuAnim)})`;
document.getElementById("startBtn").style.transform = `translateY(${2*Math.sin(menuAnim)}px)`;
document.getElementById("settingsBtn").style.transform = `translateY(${2*Math.sin(menuAnim+1)}px)`;

// Red line flash occasionally
flashTimer += Math.random() < 0.05 ? 1 : 0;
if(flashTimer>0){
ctx.clearRect(0,0,800,400);
ctx.fillStyle="red";
ctx.fillRect(0,Math.random()*400,800,3);
flashTimer--;
}

if(gameState==="menu") requestAnimationFrame(animateMenu);
}

function showMenu(){
gameState="menu";
document.getElementById("menu").style.display="block";
document.getElementById("end").style.display="none";
c.style.display="none";
animateMenu();
}

function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("end").style.display="none";
c.style.display="block";
init();
loop();
}

function toggleSettings(){
let s = document.getElementById("settings");
s.style.display = s.style.display==="block" ? "none" : "block";
}

const gravity = 0.5;

const levels = [
{p:[[0,380,800,20,"n"],[150,320,120,10,"n"],[350,260,120,10,"n"]],e:[{x:400,y:360}],c:[[180,280],[380,220]],g:[720,220]},
{p:[[0,380,800,20,"n"],[100,300,80,10,"b"],[300,240,80,10,"n"],[500,180,80,10,"n"]],e:[{x:520,y:160}],c:[[120,260]],g:[700,140]},
{p:[[0,380,800,20,"n"],[200,300,100,10,"m"],[400,260,100,10,"m"]],e:[{x:420,y:240}],c:[[220,260],[420,220]],g:[700,220]},
{p:[[0,380,800,20,"n"],[150,300,80,10,"n"],[250,250,80,10,"n"],[350,200,80,10,"n"]],e:[{x:360,y:180}],c:[[170,260]],g:[700,180]},
{p:[[0,380,800,20,"n"],[300,320,120,10,"b"],[500,260,120,10,"b"]],e:[{x:520,y:240}],c:[[320,280]],g:[700,220]},
{p:[[0,380,800,20,"n"],[100,320,80,10,"n"],[300,260,80,10,"n"],[500,200,80,10,"n"]],e:[{x:520,y:180}],c:[[120,280]],g:[700,180]},
{p:[[0,380,800,20,"n"],[200,300,100,10,"m"],[450,230,100,10,"b"]],e:[{x:470,y:210}],c:[[220,260]],g:[700,200]},
{p:[[0,380,800,20,"n"],[150,300,80,10,"n"],[350,260,80,10,"n"],[550,220,80,10,"n"]],e:[{x:560,y:200}],c:[[170,260]],g:[700,180]},
{p:[[0,380,800,20,"n"],[250,300,100,10,"b"],[450,240,100,10,"m"]],e:[{x:470,y:220}],c:[[270,260]],g:[700,200]},
{p:[[0,380,800,20,"n"],[300,300,120,10,"n"],[500,220,120,10,"n"]],e:[{x:520,y:200}],c:[[320,260]],g:[700,180]},
{p:[[0,380,800,20,"n"],[200,300,100,10,"n"],[350,240,100,10,"n"],[500,180,100,10,"n"]],e:[],c:[[220,260]],g:[700,140]},
{p:[[0,380,800,20,"n"],[250,300,100,10,"m"],[450,200,100,10,"n"]],e:[{x:470,y:180}],c:[[270,260]],g:[700,160]},
{p:[[0,380,800,20,"n"],[150,300,80,10,"n"],[350,260,80,10,"n"],[550,220,80,10,"n"]],e:[{x:560,y:200}],c:[[170,260]],g:[700,180]},
{p:[[0,380,800,20,"n"],[200,300,100,10,"b"],[400,240,100,10,"m"]],e:[{x:420,y:220}],c:[[220,260]],g:[700,200]},
{boss:true,p:[[0,360,800,40,"n"]]}
];

function spawnParticles(x,y,color){
for(let i=0;i<8;i++){
particles.push({x,y,dx:(Math.random()-0.5)*3,dy:(Math.random()-0.5)*3,life:20,color});
}
}

function update(){
if(gameState!=="play") return;
let L = levels[level];

player.dx = keys["a"]?-3:keys["d"]?3:0;

if((keys["w"]||keys[" "]) && player.jumps<2){
player.dy=-10; player.jumps++;
keys["w"]=keys[" "]=false;
}

if(keys["j"] && attackTimer<=0){ attackTimer=15; }
if(attackTimer>0) attackTimer--;

player.dy+=gravity;
player.x+=player.dx;
player.y+=player.dy;

// platforms
if(L.p){
L.p.forEach(p=>{
let [x,y,w,h,t]=p;
if(t==="m") p[0]+=Math.sin(Date.now()/400)*0.5;

if(player.x<x+w && player.x+20>x && player.y<y+h && player.y+20>y){
if(player.dy>0){
player.y=y-20; player.dy=0; player.jumps=0;
if(t==="b") player.dy=-14;
}
}
});
}

// enemies follow player
if(L.e){
L.e.forEach((e,i)=>{
let dx = player.x - e.x;
let dy = player.y - e.y;
e.x += Math.sign(dx)*1;
e.y += Math.sign(dy)*0.5;

if(Math.abs(dx)<20 && Math.abs(dy)<20){
player.hp-=0.5;
shake=5; flash=5;
spawnParticles(player.x,player.y,"red");
}

if(attackTimer>0 && Math.abs(dx)<30 && Math.abs(dy)<30){
spawnParticles(e.x,e.y,"orange");
L.e.splice(i,1);
score+=20;
}
});
}

// boss
if(L.boss && !bossDying){
boss.x += boss.dir*2;
if(boss.x<100||boss.x>700) boss.dir*=-1;

if(Math.abs(player.x-boss.x)<40 && Math.abs(player.y-boss.y)<40){
player.hp-=0.5;
shake=5; flash=5;
spawnParticles(player.x,player.y,"red");
}

if(attackTimer>0 && Math.abs(player.x-boss.x)<50){
boss.hp--;
spawnParticles(boss.x,boss.y,"orange");
if(boss.hp<=0){
bossDying = true;
shake = 30; // massive shake
setTimeout(()=>endGame("YOU WIN!"),10000); // 10s dramatic pause
}
}
}

// coins
if(L.c){
L.c = L.c.filter(c=>{
if(Math.abs(player.x-c[0])<20 && Math.abs(player.y-c[1])<20){
score+=10;
spawnParticles(c[0],c[1],"yellow");
return false;
}
return true;
});
}

// goal
if(L.g){
if(Math.abs(player.x-L.g[0])<20 && Math.abs(player.y-L.g[1])<20 && !L.boss){
level++; player.x=50; player.y=300;
}
}

if(player.hp<=0) endGame("GAME OVER");

particles.forEach(p=>{
p.x+=p.dx; p.y+=p.dy; p.life--;
});
particles = particles.filter(p=>p.life>0);

if(shake>0 && !bossDying) shake--;
if(flash>0) flash--;
}

function draw(){
ctx.save();

if(shake>0) ctx.translate(Math.random()*shake,Math.random()*shake);

// flash red
if(flash>0){
ctx.fillStyle="rgba(255,0,0,0.2)";
ctx.fillRect(0,0,800,400);
}

ctx.clearRect(0,0,800,400);
let L = levels[level];

// player
ctx.fillStyle="white";
ctx.fillRect(player.x,player.y,20,20);

// sword
if(attackTimer>0){
ctx.fillStyle="cyan";
ctx.fillRect(player.x+20,player.y+5,15,5);
}

// platforms
if(L.p){
L.p.forEach(p=>{
ctx.fillStyle = p[4]==="b"?"orange":p[4]==="m"?"cyan":"#555";
ctx.fillRect(p[0],p[1],p[2],p[3]);
});
}

// enemies (glow)
if(L.e){
L.e.forEach(e=>{
ctx.shadowColor="red";
ctx.shadowBlur=10;
ctx.fillStyle="red";
ctx.fillRect(e.x,e.y,20,20);
ctx.shadowBlur=0;
});
}

// boss
if(L.boss){
ctx.fillStyle="red";
ctx.fillRect(boss.x,boss.y,boss.w,boss.h);
ctx.fillText("Boss HP:"+boss.hp,600,20);
}

// coins (glow)
if(L.c){
L.c.forEach(c=>{
ctx.shadowColor="yellow";
ctx.shadowBlur=10;
ctx.fillStyle="yellow";
ctx.fillRect(c[0],c[1],10,10);
ctx.shadowBlur=0;
});
}

// goal
if(L.g){
ctx.fillStyle="lime";
ctx.fillRect(L.g[0],L.g[1],15,15);
}

// particles
particles.forEach(p=>{
ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,3,3);
});

// UI
ctx.fillStyle="white";
ctx.fillText("Level: "+(level+1),10,20);
ctx.fillText("Score: "+score,10,40);
ctx.fillText("HP: "+Math.floor(player.hp),10,60);

ctx.restore();
}

function endGame(text){
gameState="end";
document.getElementById("endText").innerText = text + " | Score: "+score;
document.getElementById("end").style.display="block";
c.style.display="none";
}

function loop(){
if(gameState==="play"){
update();
draw();
requestAnimationFrame(loop);
}
}

// start at menu
showMenu();
</script>

</body>
</html>
